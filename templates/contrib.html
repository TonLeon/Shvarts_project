{% extends "base.html" %}

{% block title %}Материалы — Елена Шварц{% endblock %}

{% block content %}
<div class="materials">
  <h1 class="page-title">Фотоархив</h1>

  <ul class="gallery">
    {% for photo in photos %}
    <li>
      <a class="gallery__link" href="{{ url_for('static', filename='photo/' + photo.full) }}">
        <img class="gallery__thumb" src="{{ url_for('static', filename='photo/' + photo.thumb) }}"
             alt="Фотография из архива Елены Шварц ({{ loop.index }} из {{ photos|length }})" loading="lazy">
      </a>
    </li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
