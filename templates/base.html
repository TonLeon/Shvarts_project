<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="shortcut icon" href="{{ url_for('static', filename= 'img/favicon2.png')}}" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=PT+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shvarts.css') }}">

    <title>{% block title %}Цифровое собрание сочинений Елены Шварц{% endblock %}</title>
  </head>

  <body>
    <header class="site-header">
      <a class="site-header__brand" href="/">
        <img src="{{ url_for('static', filename='img/paint3.png') }}" alt="">
        <span class="site-header__titles">
          <span class="site-header__name">Елена Шварц</span>
          <span class="site-header__subtitle">Цифровое собрание сочинений</span>
        </span>
      </a>
      <nav class="site-header__nav" aria-label="Основная навигация">
        <a href="/" {% if page_name in ('shvarts', 'project') %}aria-current="page"{% endif %}>О проекте</a>
        <a href="/list_of_texts/" {% if page_name == 'list_of_texts' %}aria-current="page"{% endif %}>Произведения</a>
        <a href="/bibl/" {% if page_name == 'bibl' %}aria-current="page"{% endif %}>Библиотека</a>
        <a href="/contrib/" {% if page_name == 'photos' %}aria-current="page"{% endif %}>Материалы</a>
        <form class="site-header__search" method="get" action="/list_of_texts/" role="search">
          <input class="field" type="search" name="q" placeholder="Поиск"
                 aria-label="Поиск по произведениям">
        </form>
      </nav>
    </header>

{% block content %}

{% endblock %}

    <footer class="site-footer">
      <p>Центр цифровых гуманитарных исследований НИУ ВШЭ</p>
      <p>ver. 0.9.1</p>
    </footer>

    <script src="{{ url_for('static', filename='js/site.js') }}" defer></script>
  </body>
</html>
